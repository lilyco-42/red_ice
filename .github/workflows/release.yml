name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            binary_name: red_ice-x86_64
          - target: aarch64-unknown-linux-gnu
            rust_target: aarch64-unknown-linux-gnu
            binary_name: red_ice-arm64
          - target: arm-unknown-linux-gnueabihf
            rust_target: armv7-unknown-linux-gnueabihf
            binary_name: red_ice-armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross
        run: cargo install cross

      - name: Build release
        run: cross build --release --manifest-path Cargo.toml -p red_ice --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: target/${{ matrix.target }}/release/red_ice-cli
          retention-days: 5

  create-release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
          files: |
            device_client/
            frontend/dist/

  upload-assets:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: red_ice-x86_64
          - name: red_ice-arm64
          - name: red_ice-armv7

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          file: dist/${{ matrix.name }}